name: CI - Development

on:
  # Run when a pull request is created targeting the release branch
  pull_request:
    branches:
      - release
    # Optional: Only trigger if PR is from develop branch
    # You can enforce with a condition inside the job later if needed

  # Run when code is merged/pushed into the release branch
  push:
    branches:
      - release

jobs:
  html-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run HTMLHint on contact.html
        run: npx htmlhint src/contact.html

  css-lint:
    runs-on: ubuntu-latest
    needs: html-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Stylelint on style.css
        run: npx stylelint styles/style.css

  build-and-push:
    runs-on: ubuntu-latest
    needs: css-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build with Parcel
        run: npm run build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker image
        run: docker build -t umairakhtar0/cs-department:dev .

      - name: Push Docker image
        run: docker push umairakhtar0/cs-department:dev

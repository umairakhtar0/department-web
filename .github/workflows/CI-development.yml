name: CI - Development

on:
  # Trigger when a PR is created targeting the release branch
  pull_request:
    branches:
      - release
  # Trigger when code is merged/pushed into release branch
  push:
    branches:
      - release

jobs:
  html-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Clean up existing node_modules
        run: |
          rm -rf node_modules 2>/dev/null || true
          rm -f package-lock.json 2>/dev/null || true
      
      - name: Install dependencies
        run: npm install --no-package-lock
      
      - name: Fix permissions and run HTMLHint
        run: |
          # Ensure the binary has execute permissions
          chmod +x node_modules/.bin/htmlhint 2>/dev/null || true
          # Run using node directly
          node node_modules/.bin/htmlhint "**/*.html"

  css-lint:
    runs-on: ubuntu-latest
    needs: html-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Clean up existing node_modules
        run: |
          rm -rf node_modules 2>/dev/null || true
          rm -f package-lock.json 2>/dev/null || true
      
      - name: Install dependencies
        run: npm install --no-package-lock
      
      - name: Fix permissions and run Stylelint
        run: |
          chmod +x node_modules/.bin/stylelint 2>/dev/null || true
          node node_modules/.bin/stylelint "src/styles/style.css"

  # Step 3: Build and push Docker image (runs after CSS lint passes)
  build-and-push:
    runs-on: ubuntu-latest
    needs: css-lint
    environment: development  # ✅ Use secrets from the development environment
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build with Parcel
        run: npm run build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker image
        run: docker build -t umairakhtar0/cs-department:dev .

      - name: Push Docker image
        run: docker push umairakhtar0/cs-department:dev
